services:
  bot:
    build: .
    container_name: sorabot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # Overrides whatever DATABASE_URL is in .env - inside compose the DB is always reachable at "db".
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-botdb}
    volumes:
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: sorabot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-botdb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
